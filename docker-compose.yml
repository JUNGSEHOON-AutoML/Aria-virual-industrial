###############################################################################
# docker-compose.yml — ARIA 컨테이너 오케스트레이션
#
# 서비스 구성:
#   backend   — FastAPI + WebSocket 서버 (포트 8200, server/app.py)  [B5 컷오버 2026-07-01]
#   ml_worker — ML 분석 워커 (CMDIAD / PatchCore / YOLO)
#   frontend  — React/Vite 개발 서버 (--profile dev 시에만 활성화)
#
# 볼륨 마운트 전략:
#   ① 모델/체크포인트/데이터셋 → :ro (읽기 전용, 호스트 원본 보호)
#   ② outputs / uploads       → 쓰기 가능 (분석 결과 저장)
#
# 호스트 데이터 경로 (워크스테이션 실제 경로):
#   - Patchcore FAISS 모델  : /userHome/userhome4/sehoon/patchcore/models
#   - CMDIAD 체크포인트      : /userHome/userhome4/sehoon/CMDIAD-main/checkpoints
#   - CMDIAD MVTec-3D 데이터 : /userHome/userhome4/sehoon/CMDIAD-main/datasets
#   - CC-IFPS 메모리 뱅크    : /userHome/userhome4/sehoon/Agentic-CCIFPS-main/memory_bank.npy
#
# NOTE: /userHome/userhome4/sehoon/datasets 경로는 존재하지 않으므로
#       CMDIAD-main/datasets를 DATASET_BASE_PATH로 사용합니다.
###############################################################################

version: "3.9"

services:
  # ── backend: FastAPI REST API + WebSocket + 대시보드 ─────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aria-backend
    volumes:
      # ① Patchcore FAISS 모델 (YOLO 가중치 다운로드를 위해 쓰기 가능)
      - /userHome/userhome4/sehoon/patchcore/models:/app/models
      # ② CMDIAD 학습 체크포인트 (DINO ViT-B/8 등, 읽기 전용)
      - /userHome/userhome4/sehoon/CMDIAD-main/checkpoints:/app/checkpoints:ro
      # ③ MVTec-3D 데이터셋 (CMDIAD 추론용, 읽기 전용)
      - /userHome/userhome4/sehoon/CMDIAD-main/datasets:/app/datasets:ro
      # ④ CC-IFPS 메모리 뱅크 단일 파일 (읽기 전용)
      - /userHome/userhome4/sehoon/Agentic-CCIFPS-main/memory_bank.npy:/app/memory_bank.npy:ro
      # ⑤ 분석 결과 이미지 출력 (쓰기 가능)
      - /userHome/userhome4/sehoon/Agentic-CCIFPS-main/outputs:/app/outputs
      # ⑥ 업로드 이미지 임시 저장 (쓰기 가능)
      - /userHome/userhome4/sehoon/Agentic-CCIFPS-main/uploads:/app/uploads
    environment:
      MODEL_BASE_PATH: /app/models
      DATASET_BASE_PATH: /app/datasets
      CHECKPOINT_BASE_PATH: /app/checkpoints
      MEMORY_BANK_PATH: /app/memory_bank.npy
      CMDIAD_DIR: /app
      OUTPUT_DIR: /app/outputs
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_ORIGINS: "*"
      OLLAMA_API_BASE: http://172.17.0.1:11434
      CCIFPS_THRESHOLD: "10.16"
      ANOMALY_THRESHOLD: "10.16"
      VLM_MODEL: qwen2.5vl:7b
    ports:
      - "8200:8200"
    command: >
      uvicorn server.app:app
        --host 0.0.0.0
        --port 8200
        --workers 1
        --timeout-keep-alive 120
    restart: unless-stopped
    # NVIDIA GPU 사용 시 아래 주석 해제
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── ml_worker: 이미지 분석 전용 워커 ────────────────────────────────────
  ml_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aria-ml-worker
    volumes:
      - /userHome/userhome4/sehoon/patchcore/models:/app/models
      - /userHome/userhome4/sehoon/CMDIAD-main/checkpoints:/app/checkpoints:ro
      - /userHome/userhome4/sehoon/CMDIAD-main/datasets:/app/datasets:ro
      - /userHome/userhome4/sehoon/Agentic-CCIFPS-main/memory_bank.npy:/app/memory_bank.npy:ro
      - /userHome/userhome4/sehoon/Agentic-CCIFPS-main/outputs:/app/outputs
      - /userHome/userhome4/sehoon/Agentic-CCIFPS-main/uploads:/app/uploads
    environment:
      # ml_worker 전용 환경 변수
      MODEL_BASE_PATH: /app/models
      DATASET_BASE_PATH: /app/datasets
      CHECKPOINT_BASE_PATH: /app/checkpoints
      MEMORY_BANK_PATH: /app/memory_bank.npy
      CMDIAD_DIR: /app
      OUTPUT_DIR: /app/outputs
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_ORIGINS: "*"
      OLLAMA_API_BASE: http://172.17.0.1:11434
      CCIFPS_THRESHOLD: "10.16"
      ANOMALY_THRESHOLD: "10.16"
      VLM_MODEL: qwen2.5vl:7b
      # ml_worker는 GPU 2번 전용
      CUDA_VISIBLE_DEVICES: "2"
    # ml_worker: 환경변수/경로 확인 후 슬립 대기
    command:
      - sh
      - -c
      - |
        python3 -c "
        import time, os
        from pathlib import Path
        print('[ml_worker] Start OK')
        for k in ['MODEL_BASE_PATH','DATASET_BASE_PATH','CHECKPOINT_BASE_PATH','MEMORY_BANK_PATH']:
            v = os.environ.get(k, '')
            print('  [' + ('OK' if Path(v).exists() else 'MISSING') + '] ' + k + ': ' + v)
        " && while true; do sleep 3600; done
    restart: unless-stopped
    # NVIDIA GPU 사용 시 아래 주석 해제
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           device_ids: ['1']
    #           capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

  # ── frontend: React/Vite 개발 서버 (개발 환경만) ─────────────────────────
  frontend:
    image: node:20-alpine
    container_name: aria-frontend
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules   # node_modules는 컨테이너 내부 사용
    environment:
      # VITE_API_URL을 빈값(상대경로)으로 설정하여 Vite 프록시를 강제 타도록 유도
      VITE_API_URL: ""
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped
    depends_on:
      - backend
    profiles:
      - dev   # `docker-compose --profile dev up`으로만 활성화

networks:
  default:
    name: aria-network
